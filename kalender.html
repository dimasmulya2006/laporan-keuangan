<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Keuangan - Manajemen Keuangan</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .calendar-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-header button { padding: 8px 15px; }
        
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 10px; text-align: center;
        }
        .calendar-day-header { font-weight: 600; padding: 10px; color: var(--text-muted); }
        .calendar-day {
            min-height: 100px; padding: 10px; background: var(--glass-bg);
            border-radius: 8px; border: 1px solid var(--border-color);
            position: relative; cursor: pointer; transition: 0.3s;
        }
        .calendar-day:hover { border-color: var(--primary); }
        .calendar-day.empty { background: transparent; border: none; cursor: default; }
        .day-num { font-weight: 600; margin-bottom: 5px; display: block; }
        .day-indicator { 
            font-size: 0.75rem; padding: 2px 5px; border-radius: 4px; margin-bottom: 3px; 
            text-align: left; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        .day-indicator.pemasukan { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .day-indicator.pengeluaran { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .transaction-list-modal { padding: 20px; }
        .transaction-item {
            display: flex; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .transaction-item:last-child { border-bottom: none; }
        
        /* Modal standard */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { width: 100%; max-width: 500px; padding: 25px; transform: translateY(-20px); transition: all 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        .close-btn:hover { color: var(--danger); }
        
        @media(max-width: 768px) {
            .calendar-day { min-height: 80px; }
            .day-indicator { display: none; } /* Hide indicators on very small screens, show dot instead */
            .calendar-day.has-trx::after {
                content: ''; position: absolute; bottom: 5px; left: 50%;
                transform: translateX(-50%); width: 6px; height: 6px;
                border-radius: 50%; background: var(--primary);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-wallet"></i>
                <h2>KeuanganKu</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="transaksi.html"><i class="fa-solid fa-money-bill-transfer"></i> Transaksi</a></li>
                <li><a href="statistik.html"><i class="fa-solid fa-chart-pie"></i> Statistik</a></li>
                <li><a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budget</a></li>
                <li><a href="target.html"><i class="fa-solid fa-piggy-bank"></i> Target</a></li>
                <li><a href="kalender.html" class="active"><i class="fa-solid fa-calendar-days"></i> Kalender</a></li>
                <li><a href="laporan.html"><i class="fa-solid fa-file-invoice"></i> Laporan</a></li>
                <li><a href="pengaturan.html"><i class="fa-solid fa-gear"></i> Pengaturan</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="mobile-toggle"><button id="sidebar-toggle" class="btn"><i class="fa-solid fa-bars"></i></button></div>
                <div><h1>Kalender Keuangan</h1></div>
                <div class="user-info"><button id="theme-toggle" class="theme-toggle"></button></div>
            </header>

            <div class="glass-card" style="padding: 20px;">
                <div class="calendar-header">
                    <button class="btn" id="prev-month"><i class="fa-solid fa-chevron-left"></i></button>
                    <h2 id="month-year-display">Bulan Tahun</h2>
                    <button class="btn" id="next-month"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                
                <div class="calendar-grid">
                    <div class="calendar-day-header">Min</div>
                    <div class="calendar-day-header">Sen</div>
                    <div class="calendar-day-header">Sel</div>
                    <div class="calendar-day-header">Rab</div>
                    <div class="calendar-day-header">Kam</div>
                    <div class="calendar-day-header">Jum</div>
                    <div class="calendar-day-header">Sab</div>
                </div>
                
                <div class="calendar-grid" id="calendar-days">
                    <!-- Injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Transaksi Harian -->
    <div class="modal-overlay" id="day-modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3 id="day-modal-title">Transaksi - Tanggal</h3>
                <button class="close-btn" id="btn-close-day"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="day-transactions-list" class="transaction-list-modal">
                <!-- Injected -->
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/kalender.js"></script>
</body>
</html>
