<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Keuangan - Manajemen Keuangan</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .target-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .target-card {
            padding: 20px;
            position: relative;
        }
        .target-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .target-header h3 { font-size: 1.1rem; color: var(--text-main); }
        .target-icon { font-size: 2rem; color: var(--primary); }
        .progress-container {
            width: 100%; height: 12px; background: var(--background-accent);
            border-radius: 6px; overflow: hidden; margin: 15px 0; position: relative;
        }
        .progress-bar {
            height: 100%; border-radius: 6px;
            background: linear-gradient(90deg, var(--primary), #8B5CF6);
            transition: width 0.5s ease;
        }
        .target-details {
            display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;
        }
        .deadline {
            font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px;
        }
        .target-actions {
            margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end;
        }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { width: 100%; max-width: 400px; padding: 25px; transform: translateY(-20px); transition: all 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        .close-btn:hover { color: var(--danger); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-wallet"></i>
                <h2>KeuanganKu</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="transaksi.html"><i class="fa-solid fa-money-bill-transfer"></i> Transaksi</a></li>
                <li><a href="statistik.html"><i class="fa-solid fa-chart-pie"></i> Statistik</a></li>
                <li><a href="budget.html"><i class="fa-solid fa-bullseye"></i> Budget</a></li>
                <li><a href="target.html" class="active"><i class="fa-solid fa-piggy-bank"></i> Target</a></li>
                <li><a href="kalender.html"><i class="fa-solid fa-calendar-days"></i> Kalender</a></li>
                <li><a href="laporan.html"><i class="fa-solid fa-file-invoice"></i> Laporan</a></li>
                <li><a href="pengaturan.html"><i class="fa-solid fa-gear"></i> Pengaturan</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="mobile-toggle"><button id="sidebar-toggle" class="btn"><i class="fa-solid fa-bars"></i></button></div>
                <div><h1>Target Keuangan</h1></div>
                <div class="user-info">
                    <button id="theme-toggle" class="theme-toggle"></button>
                </div>
            </header>

            <div class="glass-card" style="padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h3 style="margin-bottom: 5px;">Wujudkan Impian Anda</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Buat target tabungan dan pantau perkembangannya.</p>
                </div>
                <button id="btn-tambah" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Buat Target</button>
            </div>

            <div class="target-grid" id="target-container">
                <!-- Injected by JS -->
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="target-modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3 id="modal-title">Tambah Target</h3>
                <button class="close-btn" id="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="target-form">
                <input type="hidden" id="target-id">
                <div class="input-group">
                    <label>Nama Target (Contoh: Beli Laptop)</label>
                    <input type="text" id="form-nama" class="input-control" required>
                </div>
                <div class="input-group">
                    <label>Target Dana</label>
                    <input type="text" id="form-target" class="input-control" placeholder="Rp 0" required>
                </div>
                <div class="input-group">
                    <label>Dana Terkumpul Saat Ini</label>
                    <input type="text" id="form-terkumpul" class="input-control" placeholder="Rp 0" required>
                </div>
                <div class="input-group">
                    <label>Tenggat Waktu (Deadline)</label>
                    <input type="date" id="form-deadline" class="input-control" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                    <button type="button" class="btn" style="background: var(--border-color);" id="btn-batal">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Update Dana -->
    <div class="modal-overlay" id="update-modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3>Update Dana Terkumpul</h3>
                <button class="close-btn" id="btn-close-update"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="update-form">
                <input type="hidden" id="update-id">
                <div class="input-group">
                    <label>Tambah Dana (Rp)</label>
                    <input type="text" id="form-tambah-dana" class="input-control" placeholder="Rp 0" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                    <button type="button" class="btn" style="background: var(--border-color);" id="btn-batal-update">Batal</button>
                    <button type="submit" class="btn btn-success">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/target.js"></script>
</body>
</html>
